apiVersion: v1
kind: ReplicationController
metadata:
  name: mywebapp
spec:
  replicas: 3
  selector:
    app: nginx
  template:
    metadata:
      name: nginx
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: quay.io/anshuk6469/mywebapp
        ports:
        - containerPort: 80

